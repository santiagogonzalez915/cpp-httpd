# Sample config for testing load_config
Listen 6789
nThreads 4
Timeout 3

# First VirtualHost is the default when client sends no Host header
# DocumentRoot . = directory you run the server from; use tests/fixtures for sample test files
<VirtualHost *:6789>
  DocumentRoot .
  ServerName localhost
</VirtualHost>

<VirtualHost *:6789>
  DocumentRoot /tmp/mydoc
  ServerName www.example.com
</VirtualHost>

<VirtualHost *:6789>
  DocumentRoot /var/www/other
  ServerName www.other.com
</VirtualHost>

<VirtualHost *:6789>
  DocumentRoot /
  ServerName www.google.com
</VirtualHost>