name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ cmake libssl-dev

      - name: Install Catch2 v3
        run: |
          git clone --depth 1 --branch v3.5.4 https://github.com/catchorg/Catch2.git /tmp/Catch2
          cmake -S /tmp/Catch2 -B /tmp/Catch2/build -DBUILD_TESTING=OFF -DCMAKE_BUILD_TYPE=Release
          sudo cmake --build /tmp/Catch2/build --target install -j$(nproc)

      - name: Build
        run: make

      - name: Unit tests
        run: make test

      - name: ASAN + UBSan build
        run: make asan

      - name: ASAN integration smoke test
        run: |
          cat > /tmp/ci.conf << 'EOF'
          Listen 6789
          nThreads 2
          Timeout 5
          LogFile /tmp/ci_access.log
          <VirtualHost *:6789>
            DocumentRoot .
            ServerName localhost
          </VirtualHost>
          EOF
          ASAN_OPTIONS=detect_leaks=0 ./build/server_bin_asan /tmp/ci.conf &
          SERVER_PID=$!
          sleep 1
          curl -sf http://localhost:6789/Makefile      | wc -c
          curl -sf -X HEAD http://localhost:6789/Makefile
          curl -sf -X OPTIONS http://localhost:6789/   | grep -c ""
          kill $SERVER_PID

      - name: Fuzz driver corpus run
        run: |
          make fuzz_driver
          for f in fuzz/corpus/*.txt; do
            ASAN_OPTIONS=detect_leaks=0 ./build/fuzz_driver < "$f"
          done

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update -qq && sudo apt-get install -y clang-tidy libssl-dev

      - name: clang-tidy
        run: |
          clang-tidy \
            http/core/request_parser.cpp \
            http/core/http_response.cpp \
            http/handlers/static_file_handler.cpp \
            -- -std=c++17 -I. -Ihttp -I/usr/include
        continue-on-error: true  # advisory only until warnings are fully resolved
